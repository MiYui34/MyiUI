<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyiUI Overlay</title>
  <link rel="stylesheet" href="css/menu-system.css" />
  <link rel="stylesheet" href="css/hud-system.css" />
  <link rel="stylesheet" href="css/island-system.css" />
  <link rel="stylesheet" href="css/overlay.css" />
</head>
<body>
  <!-- Intro -->
  <section id="introLayer" class="layer layer--intro" hidden>
    <canvas id="introParticles"></canvas>
    <div class="intro-emblem" id="introEmblem">MyiUI</div>
    <div class="intro-iris" id="introIris"></div>
    <button type="button" class="intro-skip" id="introSkip">跳过</button>
  </section>

  <!-- Main menu -->
  <section id="menuLayer" class="layer layer--menu" hidden>
    <video id="bgVideo" class="menu-bg-video" muted loop playsinline></video>
    <div class="menu-scrim"></div>
    <div class="screen menu-screen">
      <header class="top-bar">
        <div class="logo">
          <div class="logo-mark">M</div>
          MyiUI
          <span class="version" id="menuVersion">Fabric</span>
        </div>
        <button type="button" class="glass btn-manager" id="btnManager">UI 管理器</button>
      </header>

      <main class="main-layout" id="menuMain">
        <!-- Home -->
        <div class="menu-view" data-view="home" id="viewHome">
          <article class="profile-card">
            <div class="profile-header">
              <div class="avatar" id="profileAvatar">?</div>
              <div class="profile-info">
                <h2 id="profileName">Player</h2>
                <div class="uuid" id="profileUuid">—</div>
              </div>
            </div>
            <div class="status-row">
              <span class="status-dot"></span>
              <span class="status-text" id="wsStatusText">等待连接…</span>
            </div>
          </article>
          <nav class="menu-stack">
            <button type="button" class="menu-btn menu-btn--primary" data-action="OPEN_SINGLEPLAYER">单人游戏</button>
            <button type="button" class="menu-btn" data-action="OPEN_MULTIPLAYER">多人游戏</button>
            <button type="button" class="menu-btn" data-nav="options">选项</button>
            <button type="button" class="menu-btn menu-btn--danger" data-action="QUIT">退出游戏</button>
          </nav>
        </div>

        <!-- Worlds -->
        <div class="menu-view" data-view="worlds" id="viewWorlds" hidden>
          <div class="view-header">
            <button type="button" class="back-btn" data-nav="home">← 返回</button>
            <h2>单人世界</h2>
          </div>
          <ul class="data-list" id="worldList"></ul>
        </div>

        <!-- Servers -->
        <div class="menu-view" data-view="servers" id="viewServers" hidden>
          <div class="view-header">
            <button type="button" class="back-btn" data-nav="home">← 返回</button>
            <h2>多人服务器</h2>
          </div>
          <ul class="data-list" id="serverList"></ul>
        </div>

        <!-- Options hub -->
        <div class="menu-view" data-view="options" id="viewOptions" hidden>
          <div class="view-header">
            <button type="button" class="back-btn" data-nav="home">← 返回</button>
            <h2>选项</h2>
          </div>
          <div class="options-grid" id="optionsGrid">
            <label>FOV <input type="range" id="optFov" min="30" max="110" /></label>
            <label>渲染距离 <input type="range" id="optRd" min="2" max="32" /></label>
            <label>GUI Scale <input type="range" id="optGui" min="0" max="4" /></label>
            <button type="button" class="menu-btn" id="btnSaveOptions">应用</button>
            <button type="button" class="menu-btn" data-action="OPEN_OPTIONS">打开原版选项</button>
          </div>
        </div>

        <!-- Manager -->
        <div class="menu-view" data-view="manager" id="viewManager" hidden>
          <div class="view-header">
            <button type="button" class="back-btn" data-nav="home">← 返回</button>
            <h2>UI 管理器</h2>
          </div>
          <label class="file-label">背景视频
            <input type="file" id="bgVideoInput" accept="video/*" />
          </label>
          <button type="button" class="menu-btn" id="btnReplayIntro">重播 Intro</button>
        </div>
      </main>
      <footer class="footer">MyiUI · Dual-Star · Electron Overlay</footer>
    </div>
  </section>

  <!-- In-game HUD -->
  <section id="hudLayer" class="layer layer--hud" hidden>
    <div class="myiui-hud" id="hudRoot" data-glass-mode="liquid-tinted">
      <div class="myiui-status-cluster">
        <div class="myiui-status-panel myiui-liquid-glass myiui-liquid-glass--tinted">
          <div class="myiui-status-row">
            <div class="myiui-status-header">
              <span class="myiui-status-label">生命</span>
              <span class="myiui-status-value" id="healthCaption">20 / 20</span>
            </div>
            <div class="myiui-bar-track myiui-health-track" id="healthTrack" data-low="false" data-damaged="false">
              <div class="myiui-bar-fill myiui-bar-fill--health" id="healthFill"></div>
              <div class="myiui-bar-fill myiui-bar-fill--absorption" id="absorptionFill"></div>
            </div>
          </div>
          <div class="myiui-status-row myiui-hunger-row" data-appleskin="true">
            <div class="myiui-status-header">
              <span class="myiui-status-label">饥饿</span>
              <span class="myiui-status-value" id="hungerCaption">20 / 20</span>
            </div>
            <div class="myiui-hunger-stack">
              <div class="myiui-bar-track">
                <div class="myiui-bar-fill myiui-bar-fill--saturation" id="saturationFill"></div>
                <div class="myiui-bar-fill myiui-bar-fill--hunger" id="hungerFill"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="myiui-hotbar-wrap">
        <div class="myiui-hotbar-tray myiui-liquid-glass myiui-liquid-glass--tinted">
          <div class="myiui-hotbar-slots" id="hotbarSlots"></div>
        </div>
      </div>
    </div>

    <!-- Dynamic Island -->
    <div class="myiui-island" id="islandRoot" data-mode="collapsed">
      <div class="island-pill" id="islandPill">
        <span id="islandLabel">MyiUI</span>
      </div>
      <div class="island-expand" id="islandExpand" hidden>
        <ul id="islandPlayers"></ul>
      </div>
    </div>

    <!-- Now playing -->
    <div class="now-playing" id="nowPlaying" hidden>
      <img id="npCover" alt="" />
      <div class="np-meta">
        <div id="npTitle">—</div>
        <div id="npArtist">—</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-messages" id="chatMessages"></div>
    </div>
  </section>

  <!-- ClickGui -->
  <section id="clickGuiLayer" class="layer layer--clickgui" hidden>
    <div class="clickgui-panel">
      <h2>MyiUI ClickGui</h2>
      <label><input type="checkbox" id="cgChat" checked /> Electron 聊天</label>
      <label><input type="checkbox" id="cgIsland" checked /> 灵动岛</label>
      <label><input type="checkbox" id="cgHud" checked /> HUD</label>
      <div class="music-panel" id="musicPanel">
        <h3>网易云</h3>
        <div id="neStatus">未连接 API</div>
        <button type="button" id="neQr">扫码登录</button>
        <input type="search" id="neSearch" placeholder="搜索歌曲" />
        <ul id="neResults"></ul>
        <div class="ne-controls">
          <button type="button" id="nePrev">⏮</button>
          <button type="button" id="nePlay">⏯</button>
          <button type="button" id="neNext">⏭</button>
        </div>
      </div>
      <div class="layout-editor">
        <h3>布局</h3>
        <label>Island X <input type="range" id="layIslandX" min="0" max="100" value="50" /></label>
        <label>Island Y <input type="range" id="layIslandY" min="0" max="40" value="8" /></label>
      </div>
      <div class="web-panel-box">
        <h3>浏览器</h3>
        <input type="url" id="webUrl" value="https://www.minecraft.net" />
        <button type="button" id="webOpen">打开面板</button>
        <iframe id="webFrame" hidden></iframe>
      </div>
      <button type="button" id="cgClose">关闭 (Right Shift)</button>
    </div>
  </section>

  <div id="toastHost" class="toast-host"></div>

  <script src="js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyUI — 资源包</title>
  <link rel="stylesheet" href="css/menu-system.css">
</head>
<body>
  <div id="viewport"><div id="canvas">
    <div class="panorama" aria-hidden="true"></div><div class="overlay" aria-hidden="true"></div>
    <div class="screen">
      <header class="top-bar"><div class="logo"><div class="logo-mark">M</div>MyUI<span class="version">资源包</span></div></header>
      <main class="main-layout">
        <article class="profile-card">
          <div class="profile-header"><div class="avatar">SB</div><div class="profile-info"><h2>Steve_Builder</h2><div class="uuid">a3f2…8c1d</div></div></div>
          <div class="status-row"><span class="status-dot"></span><span class="status-text">资源包</span></div>
        </article>
        <section class="content-panel">
          <header class="panel-header">
            <a href="options-hub.html" class="back-btn" data-nav="options-hub.html"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M38 14L22 32l16 18"/></svg>返回</a>
            <h1>资源包</h1>
            <div class="panel-actions"><button type="button" class="glass-btn glass-btn--sm">打开文件夹</button></div>
          </header>
          <div class="panel-body">
            <div class="section-label">已选资源包</div>
            <div class="pack-list">
              <div class="pack-row pack-row--enabled">
                <div class="pack-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 20l16-8 16 8v24l-16 8-16-8z"/></svg></div>
                <div class="pack-info"><h3>Default</h3><p>Minecraft 默认资源</p></div>
                <label class="toggle pack-toggle"><input type="checkbox" checked disabled><span class="toggle-track"></span></label>
              </div>
              <div class="pack-row pack-row--enabled">
                <div class="pack-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 20l16-8 16 8v24l-16 8-16-8z"/></svg></div>
                <div class="pack-info"><h3>MyUI Glass Pack</h3><p>毛玻璃 UI 纹理 · v0.4</p></div>
                <label class="toggle pack-toggle"><input type="checkbox" checked><span class="toggle-track"></span></label>
              </div>
              <div class="pack-row">
                <div class="pack-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 20l16-8 16 8v24l-16 8-16-8z"/></svg></div>
                <div class="pack-info"><h3>Faithful 32×</h3><p>32× 高清材质</p></div>
                <label class="toggle pack-toggle"><input type="checkbox"><span class="toggle-track"></span></label>
              </div>
            </div>
            <div class="section-label">可用资源包</div>
            <div class="pack-list">
              <div class="pack-row">
                <div class="pack-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 20l16-8 16 8v24l-16 8-16-8z"/></svg></div>
                <div class="pack-info"><h3>Vanilla Tweaks</h3><p>小幅视觉优化合集</p></div>
                <label class="toggle pack-toggle"><input type="checkbox"><span class="toggle-track"></span></label>
              </div>
              <div class="pack-row pack-row--disabled">
                <div class="pack-icon"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 20l16-8 16 8v24l-16 8-16-8z"/></svg></div>
                <div class="pack-info"><h3>Sonic Ether 光影</h3><p>需要 OptiFabric / Iris · 不兼容</p></div>
                <label class="toggle pack-toggle"><input type="checkbox" disabled><span class="toggle-track"></span></label>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div></div>
  <script src="js/menu-system.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyUI — 皮肤自定义</title>
  <link rel="stylesheet" href="css/menu-system.css">
</head>
<body>
  <div id="viewport"><div id="canvas">
    <div class="panorama" aria-hidden="true"></div><div class="overlay" aria-hidden="true"></div>
    <div class="screen">
      <header class="top-bar"><div class="logo"><div class="logo-mark">M</div>MyUI<span class="version">皮肤</span></div></header>
      <main class="main-layout">
        <article class="profile-card">
          <div class="profile-header"><div class="avatar">SB</div><div class="profile-info"><h2>Steve_Builder</h2><div class="uuid">a3f2…8c1d</div></div></div>
          <div class="status-row"><span class="status-dot"></span><span class="status-text">皮肤自定义</span></div>
        </article>
        <section class="content-panel">
          <header class="panel-header">
            <a href="options-hub.html" class="back-btn" data-nav="options-hub.html"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M38 14L22 32l16 18"/></svg>返回</a>
            <h1>皮肤自定义</h1>
          </header>
          <div class="panel-body">
            <div class="section-label">模型</div>
            <div class="setting-row"><div><label>玩家模型</label></div><div class="enum-row"><button type="button" class="enum-chip selected">经典（Steve）</button><button type="button" class="enum-chip">纤细（Alex）</button></div></div>
            <div class="setting-row"><div><label>显示披风</label></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>显示外套层</label></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>显示帽子层</label></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="section-label">皮肤来源</div>
            <div class="setting-row"><div><label>当前皮肤</label></div><div class="enum-row"><button type="button" class="enum-chip selected">Minecraft 账户</button><button type="button" class="enum-chip">本地文件</button><button type="button" class="enum-chip">MyUI 预设</button></div></div>
            <div class="setting-row"><div><label>选择皮肤文件</label></div><button type="button" class="keybind-btn">浏览…</button></div>
            <div class="section-label">预览</div>
            <div class="skin-preview" aria-label="皮肤预览">
              <div class="skin-model">
                <div class="skin-head"></div>
                <div class="skin-body"></div>
                <div class="skin-arm-l"></div>
                <div class="skin-arm-r"></div>
                <div class="skin-leg-l"></div>
                <div class="skin-leg-r"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div></div>
  <script src="js/menu-system.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyUI — 辅助功能</title>
  <link rel="stylesheet" href="css/menu-system.css">
</head>
<body>
  <div id="viewport"><div id="canvas">
    <div class="panorama" aria-hidden="true"></div><div class="overlay" aria-hidden="true"></div>
    <div class="screen">
      <header class="top-bar"><div class="logo"><div class="logo-mark">M</div>MyUI<span class="version">辅助功能</span></div></header>
      <main class="main-layout">
        <article class="profile-card">
          <div class="profile-header"><div class="avatar">SB</div><div class="profile-info"><h2>Steve_Builder</h2><div class="uuid">a3f2…8c1d</div></div></div>
          <div class="status-row"><span class="status-dot"></span><span class="status-text">辅助功能</span></div>
        </article>
        <section class="content-panel">
          <header class="panel-header">
            <a href="options-hub.html" class="back-btn" data-nav="options-hub.html"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M38 14L22 32l16 18"/></svg>返回</a>
            <h1>辅助功能</h1>
          </header>
          <div class="panel-body">
            <div class="section-label">视觉</div>
            <div class="setting-row"><div><label>旁白</label><div class="desc">屏幕阅读器朗读界面元素</div></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>高对比度</label></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>受伤视角晃动</label></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>失真效果</label><div class="desc">传送门、 nausea 等视觉效果</div></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="section-label">动效</div>
            <div class="setting-row"><div><label>屏幕震动强度</label></div><div class="slider-wrap"><input type="range" min="0" max="100" step="10" value="100" data-unit="%"><div class="slider-value">100%</div></div></div>
            <div class="setting-row"><div><label>FOV 效果</label><div class="desc">速度、药水等引起的视场变化</div></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="section-label">输入</div>
            <div class="setting-row"><div><label>自动跳跃</label></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>切换潜行</label><div class="desc">单击切换而非按住</div></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>切换冲刺</label></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
          </div>
        </section>
      </main>
    </div>
  </div></div>
  <script src="js/menu-system.js"></script>
</body>
</html>

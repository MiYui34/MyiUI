<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyUI — 视频设置</title>
  <link rel="stylesheet" href="css/menu-system.css">
</head>
<body>
  <div id="viewport"><div id="canvas">
    <div class="panorama" aria-hidden="true"></div><div class="overlay" aria-hidden="true"></div>
    <div class="screen">
      <header class="top-bar"><div class="logo"><div class="logo-mark">M</div>MyUI<span class="version">视频设置</span></div></header>
      <main class="main-layout">
        <article class="profile-card">
          <div class="profile-header"><div class="avatar">SB</div><div class="profile-info"><h2>Steve_Builder</h2><div class="uuid">a3f2…8c1d</div></div></div>
          <div class="status-row"><span class="status-dot"></span><span class="status-text">视频设置</span></div>
        </article>
        <section class="content-panel">
          <header class="panel-header">
            <a href="options-hub.html" class="back-btn" data-nav="options-hub.html"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M38 14L22 32l16 18"/></svg>返回</a>
            <h1>视频设置</h1>
          </header>
          <div class="panel-body">
            <div class="section-label">显示</div>
            <div class="setting-row"><div><label>全屏</label><div class="desc">以全屏模式运行游戏</div></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>界面缩放</label></div><div class="slider-wrap"><input type="range" min="1" max="4" step="1" value="2" data-unit="×"><div class="slider-value">2×</div></div></div>
            <div class="setting-row"><div><label>视场角</label></div><div class="slider-wrap"><input type="range" min="30" max="110" value="70" data-unit="°"><div class="slider-value">70°</div></div></div>
            <div class="setting-row"><div><label>亮度</label></div><div class="slider-wrap"><input type="range" min="0" max="100" value="50" data-unit="%"><div class="slider-value">50%</div></div></div>
            <div class="section-label">画质</div>
            <div class="setting-row"><div><label>图形</label></div><div class="enum-row"><button type="button" class="enum-chip">流畅</button><button type="button" class="enum-chip">快速</button><button type="button" class="enum-chip selected">fancy</button><button type="button" class="enum-chip">极佳</button></div></div>
            <div class="setting-row"><div><label>渲染距离</label></div><div class="enum-row"><button type="button" class="enum-chip">4</button><button type="button" class="enum-chip">8</button><button type="button" class="enum-chip selected">12</button><button type="button" class="enum-chip">16</button><button type="button" class="enum-chip">24</button><button type="button" class="enum-chip">32</button></div></div>
            <div class="setting-row"><div><label>垂直同步</label></div><label class="toggle"><input type="checkbox" checked><span class="toggle-track"></span></label></div>
            <div class="setting-row"><div><label>最大帧率</label></div><div class="enum-row"><button type="button" class="enum-chip">30</button><button type="button" class="enum-chip">60</button><button type="button" class="enum-chip selected">120</button><button type="button" class="enum-chip">144</button><button type="button" class="enum-chip">无限制</button></div></div>
          </div>
        </section>
      </main>
    </div>
  </div></div>
  <script src="js/menu-system.js"></script>
</body>
</html>

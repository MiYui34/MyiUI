<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyUI — 语言</title>
  <link rel="stylesheet" href="css/menu-system.css">
</head>
<body>
  <div id="viewport"><div id="canvas">
    <div class="panorama" aria-hidden="true"></div><div class="overlay" aria-hidden="true"></div>
    <div class="screen">
      <header class="top-bar"><div class="logo"><div class="logo-mark">M</div>MyUI<span class="version">语言</span></div></header>
      <main class="main-layout">
        <article class="profile-card">
          <div class="profile-header"><div class="avatar">SB</div><div class="profile-info"><h2>Steve_Builder</h2><div class="uuid">a3f2…8c1d</div></div></div>
          <div class="status-row"><span class="status-dot"></span><span class="status-text">语言设置</span></div>
        </article>
        <section class="content-panel">
          <header class="panel-header">
            <a href="options-hub.html" class="back-btn" data-nav="options-hub.html"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2"><path d="M38 14L22 32l16 18"/></svg>返回</a>
            <h1>语言</h1>
          </header>
          <div class="panel-body">
            <div class="section-label">游戏语言</div>
            <div class="setting-row"><div><label>界面语言</label><div class="desc">更改游戏菜单与提示的语言</div></div><div class="enum-row"><button type="button" class="enum-chip selected">简体中文</button><button type="button" class="enum-chip">English</button><button type="button" class="enum-chip">日本語</button></div></div>
            <div class="setting-row"><div><label>强制 Unicode 字体</label><div class="desc">某些语言需要 Unicode 字体才能正确显示</div></div><label class="toggle"><input type="checkbox"><span class="toggle-track"></span></label></div>
            <div class="section-label">区域</div>
            <div class="setting-row"><div><label>日期格式</label></div><div class="enum-row"><button type="button" class="enum-chip selected">YYYY-MM-DD</button><button type="button" class="enum-chip">DD/MM/YYYY</button><button type="button" class="enum-chip">MM/DD/YYYY</button></div></div>
          </div>
        </section>
      </main>
    </div>
  </div></div>
  <script src="js/menu-system.js"></script>
</body>
</html>
